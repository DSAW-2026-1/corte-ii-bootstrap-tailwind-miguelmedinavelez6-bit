<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats Preview Card Component</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background-color: hsl(233, 47%, 7%);
    }

    .container {
      text-align: center;
      color: white;
    }

    h1 {
      margin-bottom: 30px;
    }

    .links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      text-decoration: none;
      background-color: hsl(277, 64%, 61%);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Stats Preview Card Component</h1>
    <div class="links">
      <a href="./bootstrap.html">View Bootstrap Version</a>
      <a href="./tailwind.html">View Tailwind Version</a>
    </div>
  </div>
</body>
</html>
