<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap | Stats Preview Card Component</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: hsl(233, 47%, 7%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .main-card {
      background-color: hsl(244, 38%, 16%);
      border-radius: 12px;
      overflow: hidden;
      max-width: 1100px;
    }

    .text-section {
      padding: 3rem;
      text-align: center;
    }

    .main-title {
      color: hsl(0, 0%, 100%);
      font-weight: 700;
      font-size: 2rem;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    .highlight {
      color: hsl(277, 64%, 61%);
    }

    .description {
      color: hsla(0, 0%, 100%, 0.75);
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .stat-number {
      color: white;
      font-weight: 700;
      font-size: 1.5rem;
    }

    .stat-label {
      color: hsla(0, 0%, 100%, 0.6);
      font-family: 'Lexend Deca', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .image-wrapper {
      position: relative;
      min-height: 100%;
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-wrapper::after {
      content: "";
      position: absolute;
      inset: 0;
      background: hsla(277, 64%, 61%, 0.5);
    }

    @media (min-width: 992px) {
      .text-section {
        text-align: left;
        padding: 4rem;
      }

      .stats-row {
        margin-top: 3rem;
      }
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center p-4">

  <main class="main-card container-fluid p-0">
    <div class="row g-0 flex-column-reverse flex-lg-row">
      <div class="col-lg-6 d-flex align-items-center">
        <div class="text-section">
          <h1 class="main-title">
            Get <span class="highlight">insights</span> that help your business grow.
          </h1>

          <p class="description">
            Discover the benefits of data analytics and make better decisions regarding revenue,
            customer experience, and overall efficiency.
          </p>

          <div class="row stats-row text-center text-lg-start gy-4">
            <div class="col-12 col-lg-4">
              <div class="stat-number">10k+</div>
              <div class="stat-label">companies</div>
            </div>
            <div class="col-12 col-lg-4">
              <div class="stat-number">314</div>
              <div class="stat-label">templates</div>
            </div>
            <div class="col-12 col-lg-4">
              <div class="stat-number">12M+</div>
              <div class="stat-label">queries</div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="image-wrapper h-100">
          <picture>
            <source media="(max-width: 991px)" srcset="./images/image-header-mobile.jpg">
            <img src="./images/image-header-desktop.jpg" alt="Office team working together">
          </picture>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
