<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailwind | Stats Preview Card Component</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mainBg: 'hsl(233, 47%, 7%)',
            cardBg: 'hsl(244, 38%, 16%)',
            accent: 'hsl(277, 64%, 61%)',
            paragraph: 'hsla(0, 0%, 100%, 0.75)',
            statText: 'hsla(0, 0%, 100%, 0.6)'
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            lexend: ['Lexend Deca', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-mainBg min-h-screen flex items-center justify-center p-6 font-inter">

  <main class="max-w-5xl w-full bg-cardBg rounded-xl overflow-hidden">
    <div class="flex flex-col-reverse lg:flex-row">
      
      <section class="lg:w-1/2 text-center lg:text-left px-8 py-10 sm:px-12 lg:px-16 lg:py-16 flex flex-col justify-center">
        <h1 class="text-white text-4xl font-bold leading-tight mb-6">
          Get <span class="text-accent">insights</span> that help your business grow.
        </h1>

        <p class="text-paragraph text-[15px] leading-7 mb-10">
          Discover the benefits of data analytics and make better decisions regarding revenue,
          customer experience, and overall efficiency.
        </p>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <div>
            <h2 class="text-white text-3xl font-bold">10k+</h2>
            <p class="text-statText uppercase tracking-widest text-xs font-lexend mt-2">companies</p>
          </div>
          <div>
            <h2 class="text-white text-3xl font-bold">314</h2>
            <p class="text-statText uppercase tracking-widest text-xs font-lexend mt-2">templates</p>
          </div>
          <div>
            <h2 class="text-white text-3xl font-bold">12M+</h2>
            <p class="text-statText uppercase tracking-widest text-xs font-lexend mt-2">queries</p>
          </div>
        </div>
      </section>

      <section class="lg:w-1/2 relative">
        <picture>
          <source media="(max-width: 1023px)" srcset="./images/image-header-mobile.jpg">
          <img
            src="./images/image-header-desktop.jpg"
            alt="Office team working together"
            class="w-full h-full object-cover"
          >
        </picture>
        <div class="absolute inset-0 bg-accent/50"></div>
      </section>

    </div>
  </main>

</body>
</html>
